server {
    server_name rodion.pro www.rodion.pro;

    access_log /var/log/nginx/rodion.pro.access.log;
    error_log  /var/log/nginx/rodion.pro.error.log;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/rodion.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodion.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.rodion.pro) {
        return 301 https://$host$request_uri;
    }

    if ($host = rodion.pro) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name rodion.pro www.rodion.pro;
    return 404;
}
